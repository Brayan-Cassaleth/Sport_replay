<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de cotizacion</title>
    <link rel="stylesheet" href="../style/style_solicitud_cotizacion.css">
</head>
<body>
    <div class="contenido">
        <form action="" id="solicitar_instalacion">
            <h1>Solicitar cotizaci&oacute;n</h1>
            <h4>Completa el formulario para solicitar una cotizaci&oacute;n</h4>

            <label for="">Nombre completo</label><br>
            <input type="text" placeholder="Ingresa tu nombre completo" required><br>

            <label for="">Correo electronico</label><br>
            <input type="email" placeholder="Ingresa tu correo electronico" required><br>

            <label for="">Nombre de la cancha</label><br>
            <input type="text" placeholder="Nombre de la cancha" required><br>

            <label for="">Ubicaci&oacute;n</label><br>
            <input type="text" placeholder="Ingresa la dirección de la cancha" required><br>

            <label for="">Numero de contacto</label><br>
            <input type="tel" placeholder="Ingresa un numero de contacto" required><br>

            <label for="">Observaciones</label><br>
            <textarea name="Observaciones" id="" placeholder="Observaciones"></textarea><br>

            <button class="solicitar">Solicitar</button>
            <a href="info_compradores.html">Cancelar</a>

        </form>
    </div>
</body>
</html>
