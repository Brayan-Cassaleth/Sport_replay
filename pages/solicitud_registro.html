<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/style_registro.css">
    <title>Registrarse</title>
    
</head>
<body>
    <div class="contenido">
        <form action="" id="solicitar_instalacion">
            <h1>Registrarse</h1>
            <h4>Completa el formulario para registrarse</h4>

            <label for="">Nombre completo</label><br>
            <input type="text" placeholder="Ingresa tu nombre completo" required><br>

            <label for="">Correo electronico</label><br>
            <input type="email" placeholder="Ingresa tu correo electronico" required><br>

            <label for="">Usuario</label><br>
            <input type="text" placeholder="ingresa un nombre de usuario" required><br>

            <label for="">Contraseña</label><br>
            <input type="passwrod" placeholder="Ingresa una contraseña" required><br>

            <label for="">Confirmar contraseña</label><br>
            <input type="password" placeholder="Confirmar la contraseña" required><br>

            <button class="solicitar">Registrarse</button>
            <a href="index.html">Cancelar</a>

        </form>
    </div>
</body>
</html>
